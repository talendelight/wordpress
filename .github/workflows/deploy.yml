name: Deploy to Hostinger

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version to deploy (e.g., 3.1.0)'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Uncommitted or Missed Changes
        id: detect_changes
        run: |
          echo "=========================================="
          echo "Checking for uncommitted or missed changes"
          echo "=========================================="
          
          # Get list of modified, added, deleted files
          CHANGED_FILES=$(git diff --name-status HEAD 2>/dev/null || echo "")
          UNTRACKED_FILES=$(git ls-files --others --exclude-standard 2>/dev/null || echo "")
          
          # Initialize counters and arrays
          PLUGINS_CHANGED=0
          THEMES_CHANGED=0
          MUPLUGINS_CHANGED=0
          SQL_FILES=0
          PATTERNS_CHANGED=0
          ASSETS_CHANGED=0
          PHP_FILES=0
          OTHER_FILES=0
          
          declare -a IMPORTANT_CHANGES=()
          declare -a ALL_CHANGES=()
          
          # Process changed files
          if [ -n "$CHANGED_FILES" ]; then
            echo "Modified/Deleted files detected:"
            echo "$CHANGED_FILES"
            echo ""
            
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              STATUS=$(echo "$line" | awk '{print $1}')
              FILE=$(echo "$line" | awk '{print $2}')
              ALL_CHANGES+=("[$STATUS] $FILE")
              
              # Categorize by path
              if [[ "$FILE" == wp-content/plugins/* ]]; then
                PLUGINS_CHANGED=$((PLUGINS_CHANGED + 1))
                IMPORTANT_CHANGES+=("[$STATUS] $FILE (Plugin)")
              elif [[ "$FILE" == wp-content/themes/* ]]; then
                THEMES_CHANGED=$((THEMES_CHANGED + 1))
                IMPORTANT_CHANGES+=("[$STATUS] $FILE (Theme)")
              elif [[ "$FILE" == wp-content/mu-plugins/* ]]; then
                MUPLUGINS_CHANGED=$((MUPLUGINS_CHANGED + 1))
                IMPORTANT_CHANGES+=("[$STATUS] $FILE (MU-Plugin)")
              elif [[ "$FILE" == infra/shared/db/*.sql ]]; then
                SQL_FILES=$((SQL_FILES + 1))
                IMPORTANT_CHANGES+=("[$STATUS] $FILE (Database Migration)")
              elif [[ "$FILE" == wp-content/themes/*/patterns/* ]]; then
                PATTERNS_CHANGED=$((PATTERNS_CHANGED + 1))
                IMPORTANT_CHANGES+=("[$STATUS] $FILE (Pattern)")
              elif [[ "$FILE" == wp-content/themes/*/assets/* ]]; then
                ASSETS_CHANGED=$((ASSETS_CHANGED + 1))
              elif [[ "$FILE" == *.php ]]; then
                PHP_FILES=$((PHP_FILES + 1))
              else
                OTHER_FILES=$((OTHER_FILES + 1))
              fi
            done <<< "$CHANGED_FILES"
          fi
          
          # Process untracked files
          if [ -n "$UNTRACKED_FILES" ]; then
            echo "Untracked files detected:"
            echo "$UNTRACKED_FILES"
            echo ""
            
            while IFS= read -r FILE; do
              [ -z "$FILE" ] && continue
              ALL_CHANGES+=("[NEW] $FILE")
              
              if [[ "$FILE" == wp-content/plugins/* ]]; then
                PLUGINS_CHANGED=$((PLUGINS_CHANGED + 1))
                IMPORTANT_CHANGES+=("[NEW] $FILE (Plugin)")
              elif [[ "$FILE" == wp-content/themes/* ]]; then
                THEMES_CHANGED=$((THEMES_CHANGED + 1))
                IMPORTANT_CHANGES+=("[NEW] $FILE (Theme)")
              elif [[ "$FILE" == wp-content/mu-plugins/* ]]; then
                MUPLUGINS_CHANGED=$((MUPLUGINS_CHANGED + 1))
                IMPORTANT_CHANGES+=("[NEW] $FILE (MU-Plugin)")
              elif [[ "$FILE" == infra/shared/db/*.sql ]]; then
                SQL_FILES=$((SQL_FILES + 1))
                IMPORTANT_CHANGES+=("[NEW] $FILE (Database Migration)")
              elif [[ "$FILE" == wp-content/themes/*/patterns/* ]]; then
                PATTERNS_CHANGED=$((PATTERNS_CHANGED + 1))
                IMPORTANT_CHANGES+=("[NEW] $FILE (Pattern)")
              fi
            done <<< "$UNTRACKED_FILES"
          fi
          
          # Output summary
          echo "=========================================="
          echo "Change Detection Summary:"
          echo "=========================================="
          echo "Plugins changed: $PLUGINS_CHANGED"
          echo "Themes changed: $THEMES_CHANGED"
          echo "MU-Plugins changed: $MUPLUGINS_CHANGED"
          echo "SQL migrations: $SQL_FILES"
          echo "Patterns changed: $PATTERNS_CHANGED"
          echo "Assets changed: $ASSETS_CHANGED"
          echo "PHP files changed: $PHP_FILES"
          echo "Other files: $OTHER_FILES"
          echo ""
          
          # Export to outputs
          echo "plugins_changed=$PLUGINS_CHANGED" >> $GITHUB_OUTPUT
          echo "themes_changed=$THEMES_CHANGED" >> $GITHUB_OUTPUT
          echo "muplugins_changed=$MUPLUGINS_CHANGED" >> $GITHUB_OUTPUT
          echo "sql_files=$SQL_FILES" >> $GITHUB_OUTPUT
          echo "patterns_changed=$PATTERNS_CHANGED" >> $GITHUB_OUTPUT
          
          # Show important changes
          if [ ${#IMPORTANT_CHANGES[@]} -gt 0 ]; then
            echo "[WARNING] Important changes detected that may need deployment:"
            printf '%s\n' "${IMPORTANT_CHANGES[@]}"
            echo ""
            echo "Please verify these are included in release instructions (.github/releases/vX.Y.Z.json)"
          else
            echo "[OK] No uncommitted wp-content or database changes detected"
          fi
          
          echo "=========================================="

      - name: Find Latest Release Instructions
        id: release
        run: |
          # Find latest release file or use specified version
          if [ -n "${{ github.event.inputs.release_version }}" ]; then
            RELEASE_FILE=".github/releases/v${{ github.event.inputs.release_version }}.json"
          else
            # Find latest release excluding archive folder
            RELEASE_FILE=$(find .github/releases -maxdepth 1 -name "*.json" -type f | sort -V | tail -n1)
          fi
          
          if [ ! -f "$RELEASE_FILE" ]; then
            echo "ERROR: No release instructions found"
            exit 1
          fi
          
          echo "release_file=$RELEASE_FILE" >> $GITHUB_OUTPUT
          
          # Extract version and description
          VERSION=$(jq -r '.version' "$RELEASE_FILE")
          DESCRIPTION=$(jq -r '.description' "$RELEASE_FILE")
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "description=$DESCRIPTION" >> $GITHUB_OUTPUT
          
          echo "=========================================="
          echo "Release: v$VERSION"
          echo "Description: $DESCRIPTION"
          echo "Instructions: $RELEASE_FILE"
          echo "=========================================="
          
      - name: Validate Release Instructions
        run: |
          RELEASE_FILE="${{ steps.release.outputs.release_file }}"
          
          # Validate JSON format
          if ! jq empty "$RELEASE_FILE" 2>/dev/null; then
            echo "ERROR: Invalid JSON in $RELEASE_FILE"
            exit 1
          fi
          
          # Check required fields
          if ! jq -e '.version' "$RELEASE_FILE" > /dev/null; then
            echo "ERROR: Missing 'version' field"
            exit 1
          fi
          
          if ! jq -e '.steps' "$RELEASE_FILE" > /dev/null; then
            echo "ERROR: Missing 'steps' field"
            exit 1
          fi
          
          echo "[OK] Release instructions are valid"

      - name: Cross-Reference Changes with Release
        run: |
          RELEASE_FILE="${{ steps.release.outputs.release_file }}"
          
          echo "=========================================="
          echo "Verifying detected changes match release scope"
          echo "=========================================="
          
          # Get release deployment steps
          HAS_CODE_DEPLOY=$(jq '[.steps[] | select(.type == "deploy_code")] | length > 0' "$RELEASE_FILE")
          HAS_SQL_DEPLOY=$(jq '[.steps[] | select(.type == "deploy_sql")] | length > 0' "$RELEASE_FILE")
          HAS_PLUGIN_ACTIVATE=$(jq '[.steps[] | select(.type == "activate_plugins")] | length > 0' "$RELEASE_FILE")
          
          # Check for mismatches
          WARNINGS=0
          
          # SQL files changed but no SQL deployment step
          if [ "${{ steps.detect_changes.outputs.sql_files }}" -gt 0 ] && [ "$HAS_SQL_DEPLOY" = "false" ]; then
            echo "[WARNING] SQL migration files detected but no 'deploy_sql' step in release"
            echo "          Files: $(git diff --name-only HEAD | grep 'infra/shared/db/.*\.sql' || git ls-files --others --exclude-standard | grep 'infra/shared/db/.*\.sql')"
            WARNINGS=$((WARNINGS + 1))
          fi
          
          # wp-content changed but no code deployment step
          TOTAL_WP_CHANGES=$((
            ${{ steps.detect_changes.outputs.plugins_changed }} + 
            ${{ steps.detect_changes.outputs.themes_changed }} + 
            ${{ steps.detect_changes.outputs.muplugins_changed }} + 
            ${{ steps.detect_changes.outputs.patterns_changed }}
          ))
          
          if [ $TOTAL_WP_CHANGES -gt 0 ] && [ "$HAS_CODE_DEPLOY" = "false" ]; then
            echo "[WARNING] wp-content changes detected but no 'deploy_code' step in release"
            echo "          Plugins: ${{ steps.detect_changes.outputs.plugins_changed }}"
            echo "          Themes: ${{ steps.detect_changes.outputs.themes_changed }}"
            echo "          MU-Plugins: ${{ steps.detect_changes.outputs.muplugins_changed }}"
            echo "          Patterns: ${{ steps.detect_changes.outputs.patterns_changed }}"
            WARNINGS=$((WARNINGS + 1))
          fi
          
          # Plugins changed but no activation step
          if [ "${{ steps.detect_changes.outputs.plugins_changed }}" -gt 0 ] && [ "$HAS_PLUGIN_ACTIVATE" = "false" ]; then
            echo "[INFO] Plugin files changed but no 'activate_plugins' step in release"
            echo "       This may be intentional if plugins are already active"
          fi
          
          if [ $WARNINGS -eq 0 ]; then
            echo "[OK] Detected changes align with release instructions"
          else
            echo ""
            echo "=========================================="
            echo "[WARNING] Found $WARNINGS potential mismatches"
            echo "=========================================="
            echo "The deployment will continue, but please review the warnings above."
            echo "If files were missed, consider:"
            echo "  1. Committing the changes to include them in wp-content deployment"
            echo "  2. Adding appropriate deployment steps to $RELEASE_FILE"
            echo "  3. Creating SQL migration files in infra/shared/db/ for database changes"
          fi
          
          echo "=========================================="

      - name: Check for Elementor Deployment
        id: check_elementor
        run: |
          RELEASE_FILE="${{ steps.release.outputs.release_file }}"
          HAS_ELEMENTOR=$(jq '[.steps[] | select(.type == "deploy_elementor")] | length > 0' "$RELEASE_FILE")
          echo "has_elementor=$HAS_ELEMENTOR" >> $GITHUB_OUTPUT
          
          if [ "$HAS_ELEMENTOR" = "true" ]; then
            echo "[WARNING] This release includes Elementor page deployment"
            echo "[WARNING] Ensure Elementor exports are committed to repository"
          fi
      
      - name: Check for Plugin Activation
        id: check_plugins
        run: |
          RELEASE_FILE="${{ steps.release.outputs.release_file }}"
          HAS_PLUGINS=$(jq '[.steps[] | select(.type == "activate_plugins")] | length > 0' "$RELEASE_FILE")
          echo "has_plugins=$HAS_PLUGINS" >> $GITHUB_OUTPUT
          
          if [ "$HAS_PLUGINS" = "true" ]; then
            echo "[WARNING] This release requires plugin activation"
            PLUGIN_LIST=$(jq -r '.steps[] | select(.type == "activate_plugins") | .plugins[].slug' "$RELEASE_FILE")
            echo "$PLUGIN_LIST" > plugin_list.txt
            echo "Plugins to activate:"
            cat plugin_list.txt
          fi

      - name: Pre-Deployment Health Check
        id: health_check_pre
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            cd ${{ secrets.HOSTINGER_WP_ROOT }}
            
            echo "Running pre-deployment health check..."
            
            # Upload health check script if not exists
            if [ ! -f ~/verify-production-health.php ]; then
              echo "Health check script not found - will be uploaded with code deployment"
            else
              echo "Running existing health check..."
              wp eval-file ~/verify-production-health.php --verbose || true
            fi
            
            echo "Pre-deployment check complete"

      - name: Deploy Code (wp-content)
        id: deploy_code
        run: |
          RELEASE_FILE="${{ steps.release.outputs.release_file }}"
          
          # Check if release has deploy_code step
          HAS_CODE=$(jq '[.steps[] | select(.type == "deploy_code")] | length > 0' "$RELEASE_FILE")
          
          if [ "$HAS_CODE" = "false" ]; then
            echo "No code deployment in this release"
            exit 0
          fi
          
          echo "Preparing code deployment..."
          
          # Create clean deployment directory
          mkdir -p deploy
          
          # Copy wp-content to deployment staging
          cp -r wp-content deploy/
          
          # Apply .hostingerignore exclusions
          if [ -f .hostingerignore ]; then
            echo "Applying .hostingerignore exclusions..."
            
            while IFS= read -r pattern || [ -n "$pattern" ]; do
              [[ -z "$pattern" || "$pattern" =~ ^#.*$ ]] && continue
              pattern=$(echo "$pattern" | xargs)
              [[ -z "$pattern" ]] && continue
              
              if [[ "$pattern" == wp-content/* ]]; then
                clean_pattern="${pattern#wp-content/}"
                if [[ "$clean_pattern" == *"*"* ]]; then
                  if [[ "$clean_pattern" == *"/"* ]]; then
                    find deploy/wp-content -path "deploy/wp-content/$clean_pattern" -exec rm -rf {} + 2>/dev/null || true
                  else
                    find deploy/wp-content -name "$clean_pattern" -exec rm -rf {} + 2>/dev/null || true
                  fi
                else
                  if [ -e "deploy/wp-content/$clean_pattern" ]; then
                    rm -rf "deploy/wp-content/$clean_pattern"
                  fi
                fi
              elif [[ "$pattern" == *"*"* ]]; then
                find deploy -name "$pattern" -exec rm -rf {} + 2>/dev/null || true
              fi
            done < .hostingerignore
          fi
          
          # Show deployment summary
          echo "Deployment Summary:"
          echo "----------------------------------------"
          total_files=$(find deploy -type f | wc -l)
          total_size=$(du -sh deploy | cut -f1)
          echo "Total files: $total_files"
          echo "Total size: $total_size"
          echo "code_deployed=true" >> $GITHUB_OUTPUT

      - name: Upload Code to Hostinger
        if: steps.deploy_code.outputs.code_deployed == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          source: "deploy/wp-content/*"
          target: "${{ secrets.HOSTINGER_PATH }}/"
          strip_components: 1
          overwrite: true

      - name: Clean Up Unused Themes
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            cd ${{ secrets.HOSTINGER_WP_ROOT }}/wp-content/themes
            
            echo "Removing unused WordPress default themes..."
            
            # Remove twentytwenty* themes (not used, consuming ~13.6MB)
            for theme in twentytwentythree twentytwentyfour twentytwentyfive; do
              if [ -d "$theme" ]; then
                rm -rf "$theme" && echo "[OK] Removed: $theme" || echo "[WARNING] Failed to remove: $theme"
              else
                echo "[WARNING] Not found: $theme (already removed)"
              fi
            done
            
            echo "Theme cleanup complete"

      - name: Upload Health Check Script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          source: "infra/shared/scripts/verify-production-health.php"
          target: "~/"
          strip_components: 3

      - name: Check Database Migrations
        id: check_database
        run: |
          RELEASE_FILE="${{ steps.release.outputs.release_file }}"
          
          # Check if release has database migrations
          HAS_DATABASE=$(jq '[.steps[] | select(.type == "deploy_database")] | length > 0' "$RELEASE_FILE")
          
          if [ "$HAS_DATABASE" = "false" ]; then
            echo "No database migrations in this release"
            echo "has_database=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Extract migration files
          jq -r '.steps[] | select(.type == "deploy_database") | .migrations[].file' "$RELEASE_FILE" > migration_files.txt
          
          # Check if any migrations are specified
          if [ ! -s migration_files.txt ]; then
            echo "No migration files specified - skipping database deployment"
            echo "has_database=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Database migrations to deploy:"
          cat migration_files.txt
          echo "has_database=true" >> $GITHUB_OUTPUT

      - name: Deploy Database Changes
        id: deploy_database
        if: steps.check_database.outputs.has_database == 'true'
        run: |
          # Create staging directory
          mkdir -p db-staging
          
          # Copy migration files listed in migration_files.txt
          while IFS= read -r sql_file; do
            if [ -f "$sql_file" ]; then
              cp "$sql_file" db-staging/
              echo "Staged: $sql_file"
            else
              echo "ERROR: Migration file not found: $sql_file"
              exit 1
            fi
          done < migration_files.txt
          
          echo "database_deployed=true" >> $GITHUB_OUTPUT

      - name: Upload Database Changes
        if: steps.deploy_database.outputs.database_deployed == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          source: "db-staging/*.sql"
          target: "~/db-deploy/"
          strip_components: 1

      - name: Execute Database SQL Files
        if: steps.deploy_database.outputs.database_deployed == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            cd ${{ secrets.HOSTINGER_WP_ROOT }}
            
            echo "Executing database migrations..."
            
            for sql_file in ~/db-deploy/*.sql; do
              if [ -f "$sql_file" ]; then
                echo "Executing: $(basename $sql_file)"
                if ! wp db query < "$sql_file" --allow-root; then
                  echo "[ERROR] Migration failed: $sql_file"
                  exit 1
                fi
                echo "[OK] Success: $(basename $sql_file)"
              fi
            done
            
            # Cleanup
            rm -rf ~/db-deploy
            
            echo "Database deployment complete"

      - name: Activate Theme
        id: activate_theme
        run: |
          RELEASE_FILE="${{ steps.release.outputs.release_file }}"
          
          # Check if release has theme activation
          HAS_THEME=$(jq '[.steps[] | select(.type == "activate_theme")] | length > 0' "$RELEASE_FILE")
          
          if [ "$HAS_THEME" = "false" ]; then
            echo "No theme activation in this release"
            exit 0
          fi
          
          THEME=$(jq -r '.steps[] | select(.type == "activate_theme") | .config.theme' "$RELEASE_FILE")
          echo "theme_name=$THEME" >> $GITHUB_OUTPUT
          echo "theme_activated=true" >> $GITHUB_OUTPUT

      - name: Execute Theme Activation
        if: steps.activate_theme.outputs.theme_activated == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            cd ${{ secrets.HOSTINGER_WP_ROOT }}
            
            THEME="${{ steps.activate_theme.outputs.theme_name }}"
            echo "Activating theme: $THEME"
            
            if wp theme activate "$THEME"; then
              echo "[OK] Theme activated: $THEME"
            else
              echo "[ERROR] Theme activation failed: $THEME"
              exit 1
            fi

      - name: Upload Plugin List for Activation
        if: steps.check_plugins.outputs.has_plugins == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          source: "plugin_list.txt"
          target: "~/"

      - name: Execute Plugin Activation
        if: steps.check_plugins.outputs.has_plugins == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            cd ${{ secrets.HOSTINGER_WP_ROOT }}
            
            echo "Activating plugins from list..."
            
            if [ ! -f ~/plugin_list.txt ]; then
              echo "ERROR: plugin_list.txt not found"
              exit 1
            fi
            
            while IFS= read -r plugin; do
              if [ -z "$plugin" ]; then
                continue
              fi
              
              echo "Processing plugin: $plugin"
              
              if ! wp plugin is-installed "$plugin" --allow-root 2>/dev/null; then
                echo "[WARNING] Plugin not found: $plugin"
                continue
              fi
              
              if wp plugin is-active "$plugin" --allow-root 2>/dev/null; then
                echo "[OK] Already active: $plugin"
                continue
              fi
              
              if wp plugin activate "$plugin" --allow-root; then
                echo "[OK] Activated: $plugin"
              else
                echo "[ERROR] Failed: $plugin"
              fi
            done < ~/plugin_list.txt
            
            echo ""
            echo "Active plugins:"
            wp plugin list --status=active --field=name --allow-root
            
            # Cleanup
            rm -f ~/plugin_list.txt

      - name: Deploy Elementor Pages
        if: steps.check_elementor.outputs.has_elementor == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            cd ${{ secrets.HOSTINGER_WP_ROOT }}
            
            # Create elementor-exports directory if not exists
            mkdir -p ~/elementor-exports
            
            echo "[WARNING]ELEMENTOR DEPLOYMENT REQUIRES MANUAL STEPS"
            echo "================================================"
            echo ""
            echo "Elementor pages cannot be fully automated in CI/CD because:"
            echo "  - Exports require running local WordPress container"
            echo "  - Binary-safe file handling needed to avoid encoding corruption"
            echo ""
            echo "Follow these steps to complete Elementor deployment:"
            echo ""
            echo "1. Export pages locally:"
            echo "   pwsh infra/shared/scripts/export-elementor-pages.ps1"
            echo ""
            echo "2. Upload exports to production:"
            echo "   scp -r tmp/elementor-exports/ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:~/"
            echo ""
            echo "3. Upload import script:"
            echo "   scp infra/shared/scripts/import-elementor-pages.php ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:~/elementor-exports/"
            echo ""
            echo "4. Execute import on production:"
            echo "   ssh ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} 'cd ${{ secrets.HOSTINGER_WP_ROOT }} && wp eval-file ~/elementor-exports/import-elementor-pages.php'"
            echo ""
            echo "5. Clear caches:"
            echo "   ssh ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} 'cd ${{ secrets.HOSTINGER_WP_ROOT }} && wp elementor flush_css && wp litespeed-purge all'"
            echo ""
            echo "================================================"

      - name: Clear Caches
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            cd ${{ secrets.HOSTINGER_WP_ROOT }}
            
            echo "Clearing caches..."
            
            # Clear WordPress cache
            wp cache flush --allow-root && echo "[OK] WordPress cache cleared" || echo "[WARNING] WordPress cache clear failed"
            
            # Flush rewrite rules
            wp rewrite flush --allow-root && echo "[OK] Rewrite rules flushed" || echo "[WARNING] Rewrite flush failed"
            
            # Clear Elementor cache
            if wp elementor flush_css --allow-root 2>/dev/null; then
              echo "[OK] Elementor cache cleared"
            else
              echo "[WARNING]Elementor cache clear failed or plugin not active"
            fi
            
            # Clear LiteSpeed cache (if available)
            if command -v litespeed 2>/dev/null; then
              wp litespeed-purge all --allow-root 2>/dev/null && echo "[OK] LiteSpeed cache cleared" || echo "[WARNING] LiteSpeed cache clear failed"
            fi
            
            # Clear WordPress transients
            wp transient delete --all --allow-root 2>/dev/null && echo "[OK] WordPress transients cleared" || true
            
            echo "Cache clearing complete"

      - name: Post-Deployment Health Check
        id: health_check_post
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            cd ${{ secrets.HOSTINGER_WP_ROOT }}
            
            echo "Running post-deployment health check..."
            echo "========================================"
            
            if [ -f ~/verify-production-health.php ]; then
              if wp eval-file ~/verify-production-health.php --allow-root; then
                echo ""
                echo "[OK] All health checks passed!"
                exit 0
              else
                echo ""
                echo "Some health checks failed - review output above"
                echo "[WARNING]Deployment may need attention"
                exit 1
              fi
            else
              echo "[WARNING]Health check script not found"
              echo "Manual verification required"
              exit 0
            fi

      - name: Deployment Summary
        if: always()
        run: |
          RELEASE_FILE="${{ steps.release.outputs.release_file }}"
          VERSION="${{ steps.release.outputs.version }}"
          
          echo ""
          echo "=========================================="
          echo "Deployment Summary"
          echo "=========================================="
          echo "Release: v$VERSION"
          echo "Description: ${{ steps.release.outputs.description }}"
          echo "Code deployed: ${{ steps.deploy_code.outputs.code_deployed || 'false' }}"
          echo "Database deployed: ${{ steps.deploy_database.outputs.database_deployed || 'false' }}"
          echo "Theme activated: ${{ steps.activate_theme.outputs.theme_activated || 'false' }}"
          echo "Plugins activated: ${{ steps.check_plugins.outputs.has_plugins || 'false' }}"
          echo "Elementor pages: ${{ steps.check_elementor.outputs.has_elementor || 'false' }}"
          echo "Health check: ${{ steps.health_check_post.outcome || 'not_run' }}"
          echo "=========================================="
          echo ""
          
          # Show features deployed
          if [ -f "$RELEASE_FILE" ]; then
            echo "Features deployed:"
            jq -r '.features[]' "$RELEASE_FILE" 2>/dev/null | sed 's/^/  - /' || echo "  (none specified)"
            echo ""
          fi
          
          # Show manual verification steps
          echo "Manual Verification Required:"
          if [ -f "$RELEASE_FILE" ]; then
            jq -r '.verification.manual[]' "$RELEASE_FILE" 2>/dev/null | sed 's/^/  - /' || echo "  (none specified)"
          fi
          echo ""
          
          if [ "${{ steps.check_elementor.outputs.has_elementor }}" = "true" ]; then
            echo "=========================================="
            echo "[WARNING]MANUAL ELEMENTOR DEPLOYMENT REQUIRED"
            echo "=========================================="
            echo "See Elementor deployment instructions above"
            echo ""
          fi
          
          if [ "${{ steps.health_check_post.outcome }}" = "failure" ]; then
            echo "=========================================="
            echo "[WARNING]HEALTH CHECK FAILURES DETECTED"
            echo "=========================================="
            echo "Review health check output above for details"
            echo "Some components may not be properly configured"
            echo ""
          fi
          
          echo "=========================================="
          echo "Next Steps"
          echo "=========================================="
          echo "1. Review deployment summary above"
          echo "2. Complete manual verification steps"
          echo "3. Test production site functionality"
          echo "4. Check for any errors in production logs"
          echo ""
          echo "Production URL: https://hireaccord.com"
          echo ""
          echo "Deployment workflow complete!"

