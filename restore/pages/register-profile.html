<!-- Forminator Form Section -->
<!-- wp:group {"align":"full","style":{"spacing":{"padding":{"top":"var:preset|spacing|48","bottom":"var:preset|spacing|64"}}},"backgroundColor":"gray-off-white","layout":{"type":"constrained"}} -->
<div class="wp-block-group alignfull has-gray-off-white-background-color has-background" style="padding-top:var(--wp--preset--spacing--48);padding-bottom:var(--wp--preset--spacing--64)">
    <!-- wp:shortcode -->
    [forminator_form id="80"]
    <!-- /wp:shortcode -->
    
    <!-- wp:html -->
    <script>
    (function() {
        // Get URL parameter
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }
        
        // Wait for form to load and populate role field
        function populateRoleField() {
            var role = getUrlParameter('td_user_role');
            console.log('URL Parameter td_user_role:', role);
            
            if (!role) {
                console.log('No role parameter found in URL');
                return;
            }
            
            // Target the specific hidden field: hidden-1
            var roleField = document.querySelector('input[name="hidden-1"]');
            
            if (roleField) {
                roleField.value = role;
                console.log('✓ Role field populated:', roleField.name, 'with value:', role);
            } else {
                console.log('⏳ Hidden field not found yet, retrying...');
                // Form might not be loaded yet, try again
                setTimeout(populateRoleField, 500);
            }
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', populateRoleField);
        } else {
            populateRoleField();
        }
    })();
    </script>
    <!-- /wp:html -->
</div>
<!-- /wp:group -->
